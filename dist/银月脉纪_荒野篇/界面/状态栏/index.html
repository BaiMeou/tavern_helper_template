柱。强度越高越稳；<span class="hl">动摇或崩溃会引发严重精神危机</span>。颈间铃铛是她的锚点。'],狐尾湿度:['🦊','尾巴的干湿程度（干燥/微湿/湿透）。<span class="hl">湿尾大幅增加散热、加重失温、拖慢移速</span>，且让晓光情绪低落。需擦干或烤干。'],九尾状态:['🦊','九条尾巴的展开程度。荒野中灵力稀薄，<span class="hl">通常合并为一尾</span>。完全展开可裹身保暖，但耗灵力。'],灵力环境:['✨','周遭灵气浓度（稀薄/正常/充沛）。荒野远离灵脉，<span class="hl">灵力稀薄→恢复力降至接近人类</span>，伤口愈合变慢、狐火难以维持。'],负重:['🎒','随身物品总重。<span class="hl">超过安全上限会降低移速、加速体力消耗</span>。放入行李舱（待搜刮）的物品暂不计入。安全上限由体质决定。'],负载分布:['⚖️','各身体位置（背包/腰挂/手持/尾藏等）的承重占比。<span class="hl">分布不均或单点超载会额外降低移速、加速疲劳</span>。智力≥6 解锁此分析。'],耐久度:['🔧','工具/装备的完好程度。使用、坠机冲击会磨损，<span class="hl">归零则损坏失效</span>。可用材料修理，或拆解取零件。'],锋利度:['🔪','刃具的锋利程度，影响砍伐/分割效率。变钝后需用磨刀石恢复。'],失温风险:['❄️','当前失温的危险等级，综合<span class="hl">气温、风速、衣物保暖、湿衣物/湿尾、篝火、庇护所</span>计算。偏高/高/极高时需立即取暖。'],气压趋势:['📊','大气压变化方向。<span class="hl">气压下降常预示天气转坏</span>（降雨、暴风雪），是晓光预判天气的依据。'],月相:['🌙','月亮盈亏阶段，影响<span class="hl">夜间能见度与夜行安全</span>，也是天体导航判断日期的参考。'],腐败风险:['🥫','食物的变质程度（安全/需尽快食用/即将腐败/已腐败）。受温度、湿度、保存方式影响。<span class="hl">吃下腐败食物有患病风险</span>。'],思维加速:['🧠','智力≥8 解锁。晓光能在脑海中快速推演制作方法，<span class="hl">更易解锁复杂配方</span>。'],核心体温:['🌡️','身体内脏的真实温度，正常 36.8°C，是判断失温的依据。<span class="hl">和体感温度不同——体感是皮肤上感受到的环境冷暖，核心体温是身体内部真正的温度</span>。核心体温下降比体感慢，但一旦下降就很危险。'],体感温度:['🥶','环境作用在皮肤上的冷热程度 = 气温 − 风的拉低 + 衣物/篝火的保暖。<span class="hl">体感越冷，核心体温流失越快</span>。这是你能通过穿衣、生火、避风直接改善的量。'],风寒指数:['💨','风让人感觉比实际气温更冷的程度。<span class="hl">风越大，皮肤上的体感就比温度计读数低几度</span>（湿身时更甚）。避风、用庇护所挡风可消除大部分风寒。'],散热速率:['♨️','身体每秒钟流失多少热量（用瓦特表示——和家用电器功率单位一样）。<span class="hl">湿尾、湿衣、大风、皮肤裸露都会让散热加快</span>；多穿、蜷缩、靠近篝火可以变慢。散热比产热快时体温就会下降。'],基础代谢率:['🔥','身体维持基本活命每天最少消耗的热量（kcal）。约 1450。<span class="hl">就算什么都不做也在烧能量</span>，寒冷和劳作还会进一步增加消耗。吃得不够这个数，就要动用体脂、慢慢消瘦。'],今日卡路里:['🍽️','今天已经吃下的热量。<span class="hl">需 ≥ 每日基本耗能 + 活动消耗</span>，否则入不敷出。荒野中很难吃够，长期入不敷出会动用体脂、慢慢消瘦。'],蛋白质平衡:['🥩','蛋白质的吃下与消耗的盈亏。<span class="hl">长期不足 → 肌肉流失、伤口愈合变慢</span>。光吃野果糖类不够，需要肉/蛋/坚果补蛋白。'],体脂储备:['🧈','身体储存的脂肪（%），是热量入不敷出时的"备用粮仓"，也影响抗寒。<span class="hl">过低 → 怕冷、虚弱；耗尽 → 开始消耗肌肉</span>。'],水分流失:['💧','每天经排汗、呼吸、排泄流失的水（mL）。<span class="hl">劳作和高温让流失加快</span>，必须靠饮水补回，否则口渴度下降、脱水。'],重心偏移:['⚖️','负重在身上分布不均导致的重心偏离。<span class="hl">偏移大→步态不稳、攀爬危险、移速下降</span>。把重物放背包贴近背部、避免单侧堆积可改善。'],单点超载:['🎒','某个身体位置的负重超过它能承受的极限。<span class="hl">会额外降低移速</span>。例如手持超过3kg。需要重新分配到背包。'],距失温阈值:['❄️','当前核心体温距离"开始失温"（35°C）还差多少度，以及按现在的散热速度估计多久会触及。<span class="hl">这是最该盯紧的安全余量</span>。'],伤口愈合阶段:['🩹','伤口的恢复进程：出血→凝血→结痂→愈合中→已愈合/留疤。<span class="hl">灵力稀薄时愈合变慢</span>，清洁和包扎能降低感染风险、加速愈合。'],感染风险:['🦠','伤口被细菌感染的概率（低/中/高/已感染）。<span class="hl">不处理的脏伤口风险升高，感染会持续扣健康</span>，需清洁、抗生素或草药。'],燃料余量:['🪵','篝火当前的燃料还能烧多少分钟。<span class="hl">烧完会转为余烬再熄灭</span>，保暖和煮食都依赖它。需持续添柴维持。'],热辐射半径:['🔥','篝火能有效供暖的范围（米）。<span class="hl">在范围内才能取暖、烘干衣物</span>。火越旺范围越大。']},$t={status:['体质','敏捷','智力','意志','感知','经验XP','核心体温','体感温度','基础代谢率','今日卡路里','蛋白质平衡','体脂储备','水分流失','睡眠债务','肌肉疲劳','累积负荷','执念','伤口愈合阶段','感染风险','狐尾湿度','九尾状态','灵力环境'],inventory:['负重','负载分布','重心偏移','单点超载','耐久度','锋利度','移速修正'],world:['失温风险','体感温度','风寒指数','散热速率','距失温阈值','气压趋势','月相'],camp:['燃料余量','热辐射半径','腐败风险','失温风险'],workshop:['思维加速','耐久度'],journal:['执念'],home:['健康','饥饿','口渴','精力','核心体温','精神','移速修正']},Tt='__wilderness_glossary_open__';function jt(e){const t=Array.isArray(e)?e:$t[e]||[],a=Array.isArray(e)?'术语说明':'本页术语说明';window.dispatchEvent(new CustomEvent(Tt,{detail:{terms:t,title:a}}))}function Ft(e){jt([e])}const At=Tt,Lt=['title'],It=(0,o.defineComponent)({__name:'InfoI',props:{term:{}},setup:e=>(t,a)=>((0,o.openBlock)(),(0,o.createElementBlock)('i',{class:'info-i',onClick:a[0]||(a[0]=(0,o.withModifiers)(t=>(0,o.unref)(Ft)(e.term),['stop'])),title:e.term},'ⓘ',8,Lt))}),Mt=(0,$e.A)(It,[['__scopeId','data-v-49cc5f61']]),Ot={class:'vh-top'},Pt={class:'vh-label'},Wt={class:'vh-ico'},Gt={class:'vh-val'},Xt={key:0,class:'u'},Kt={class:'vh-bar'},Ut={class:'vh-trend'},Rt=(0,o.defineComponent)({__name:'VitalHero',props:{icon:{},label:{},value:{},max:{},kind:{},term:{},trend:{},unit:{}},setup(e){const t=e,a=(0,o.computed)(()=>t.unit??'%'),l=(0,o.computed)(()=>Math.round(t.value)),n=(0,o.computed)(()=>{const e=t.max??100;return Math.max(0,Math.min(100,t.value/e*100))}),c=(0,o.computed)(()
