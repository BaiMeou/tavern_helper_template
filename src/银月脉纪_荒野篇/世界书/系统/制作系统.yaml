# 制作系统

## 配方解锁条件

AI应在以下情况自动判断新配方的解锁：

- **材料触发**：晓光收集到特定组合的材料时——如拿到金属水壶+软管+电工胶带→联想到蒸馏器
- **需求触发**：面临实际问题时——如想保存火种→联想到火折子
- **尝试触发**：晓光主动说"试着做一个..."——根据材料和智力判断是否可行
- **智力门槛**：智力越高，能从越少的线索中联想出配方。智力8可以仅凭"知道原理"就推导出制作步骤

## 解锁后操作

1. AI将解锁设置为true：`{ "op": "replace", "path": "/工坊/配方/配方名/已解锁", "value": true }`
2. 如果配方不存在，使用insert创建完整配方条目——必填字段：已解锁(true/false)、所需材料({})、所需工具(string)、效果描述(string)、制作耗时分钟(number)；可选字段：产出物、产出数量、产出分类、产出重量、所需智力
3. 如果材料不足但智力足够，配方可以解锁但标注缺少的材料

## 实际制作（触发引擎，勿手动改物品栏）

配方**解锁**后，当晓光真正动手制作时，AI **不要**手动从物品栏扣材料、也不要手动 insert 产出物——改为写 `$合成请求` 触发引擎，由引擎统一校验材料/智力并自动扣减、产出：

```json
{ "op": "insert", "path": "/$合成请求", "value": { "配方名": "简易渔具", "时间": "第3天 17:20" }}
```

引擎结果写入 `$上次合成` + `$前端操作`（含成功或失败原因，如"还差一根软管"），AI 据此叙事。前端工坊按钮写同一字段，两条路径一致。手动增删物品栏会绕过材料/智力校验，仅在引擎无法表达的特殊产物时才考虑。

## 制作消耗

- 制作消耗材料——从物品栏减少数量或删除条目
- 如果材料有耐久度，制作消耗整个物品（如"将绳索剪短1m"）
- 制作耗时取决于智力等级和物品复杂度——智力8可缩短约30%时间

## 属性联动

- 智力≥5：可独立推导简单工具制作（火折子、简易渔具）
- 智力≥6：可推导复杂装置（蒸馏器、陷阱系统）
- 智力≥7：可推导进阶制作（陶窑、金属加工）
- 感知≥6：更容易识别可用的天然材料
