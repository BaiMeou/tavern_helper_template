# 热力学法则

## 篝火

- 打火机每次点火消耗1次使用次数——火折子可保存火种免去重复点火
- 燃料消耗率取决于：木材类型（硬木~30min/单位、软木~18min/单位）、干湿度（干燥×1、微湿×0.7、湿透×0.3）
- 火势旺盛时中心温度600-800°C、热辐射半径1.5-2.5m
- 衰减时中心温度300-400°C、热辐射半径0.5-1m
- 余烬状态可保留数小时——吹气可重新引燃
- 篝火附近体感温度+5~15°C——取决于火势和距离

## 体温维持

- 晓光正常体温37°C——狐族略高于人类
- 失温风险公式（简化）：体温<35°C 或 (狐尾湿透 且 无庇护所 且 无篝火)
- 衣物总保暖值每增加1，约提升体感温度+0.5°C
- 庇护所内温度比外部高3-8°C（取决于庇护所类型和篝火）
- 九尾裹身干燥时体温维持+15%——但湿透后此加成完全失效

## 烹饪

- 水煮沸需要篝火+金属容器——达到沸点约5-10分钟
- 煮沸1分钟杀菌——持续沸腾3分钟可杀灭绝大多数病原体
- 烤猎物肉需要篝火+树枝/金属签——小型猎物~15min、中型肉块~25min
- 熏制需要低温(60-80°C)持续烟熏数小时——不能明火
