# 灵力系统

## 核心定位

灵力是晓光（九尾白狐）的**核心资源 + 总开关**。它不是普通的体征值，而是决定她在荒野中能突破多少限制的根本。

- **灵力够高，就能弥补/解除一切限制**：负重扛不动？灵力顶着。伤口不愈合？灵力催愈。快要失温？灵力护体。精力透支？灵力续命。
- 灵力是**纯数值、无上限**：不要把它当成 0-100 的体征。它可以涨到 100、200、甚至更高——越往后越接近"全盛"。
- 前端有一条**灵力条**，满格是"动态"的：满格参考 = 历史峰值（灵力涨过的新高会自动抬高满格），所以灵力条不会因为数值变大就显得"没满"，而是始终反映"相对自己巅峰的状态"。

## 字段（在 `晓光.狐类特性` 下）

- `灵力值`（数字，≥0，无上限）：当前灵力。**AI 主动消耗时直接写这个字段**。
- `灵力峰值`（数字）：历史最高记录。**不要手写**——schema 会自动同步 `灵力峰值 = max(灵力峰值, 灵力值)`。
- `灵力环境`（枚举：稀薄/正常/充沛）：旧字段，保留兼容。脚本会按 `灵力值` 自动回填一档（<10稀薄, <50正常, ≥50充沛）。新逻辑以 `灵力值` 为准，`灵力环境` 只作粗略显示。

派生字段（schema transform 算，AI **只读不写**）：
- `$灵力等级`：枯竭(<10) / 稀薄(<30) / 充盈(<60) / 旺盛(<100) / 全盛(≥100)。
- `$恢复倍率`：`0.5 + 灵力值/100`。灵力 0→0.5，50→1.0，100→1.5，200→2.5。影响伤口/精力恢复速度。
- `$灵力缓冲系数`：`clamp(1 − 灵力值/200, 0, 1)`。灵力 0→1（全额限制），100→0.5（半减），200+→0（限制解除）。用于衰减负重惩罚、失温散热。
- `$灵力满格参考`：`max(灵力峰值, 灵力值, 50)`。前端灵力条的分母。

## 灵脉强度（环境项，脚本算）

`世界.地形.灵脉强度`（string，AI 可写自由描述，建议值：枯竭/稀薄/正常/丰沛/灵脉交汇）决定当前位置的灵脉强弱。

**环境衰减/恢复由脚本在时间推进（`$推进时段`）时自动结算，AI 不要手写这部分**：
- 枯竭：每时段 −8
- 稀薄：每时段 −3
- 正常：每时段 0
- 丰沛：每时段 +6
- 灵脉交汇：每时段 +12
- 过夜（`次日`）额外有"休息回灵"：有庇护所 +10、无庇护所 +2，受床铺/篝火调制。
- 未知描述（AI 写的自由词）按"正常"处理，不惩罚也不奖励。

所以**让晓光待在灵脉丰沛的地方（湖底灵脉、灵脉交汇处）能自然回灵；待在枯竭区会慢慢掉灵**。叙事里可以让晓光主动寻找灵脉、避开枯竭区。

## 主动消耗（AI 在叙事里写）

施法、疗伤、扛重、强撑精力等**主动消耗灵力的行为，由 AI 在 `<UpdateVariable>` 里直接扣 `灵力值`**——脚本不插手。大致量级参考（可按场景调整）：

- **小术**（点亮灵光、轻微感知、小范围灵力护持）：−2~5
- **疗伤催愈**（用灵力加速伤口愈合、驱散寒气）：−5~15，视伤情
- **扛重超限**（灵力顶着超过安全上限的负重强行移动）：每超 5kg 约 −3~5，长途翻倍
- **施法战斗**（灵力攻击、灵盾、九尾全力展开）：−10~30，大招可 −50+
- **强行续命**（灵力顶着失温/力竭不倒下）：每时段 −10~20
- **奇迹级**（铃铛奇迹、强行干预因果）：−50~100，可能直接打空灵力

**灵力归零的代价**：灵力值 0 时进入"枯竭"——恢复倍率降到 0.5（伤口几乎不愈合、精力恢复极慢）、负重惩罚全额回来、失温散热不衰减。叙事上表现为"灵力耗尽，晓光变回一个普通的、会累会冷会受伤的小女孩"。

## 灵力总开关：各项限制如何被灵力解除

- **负重**：`$负重速度修正` 乘以 `$灵力缓冲系数`。灵力 200+ 时负重惩罚归零——晓光可以"灵力扛重"，背着远超体重的东西也走得动。
- **失温**：`$散热速率` 乘以 `(0.6 + 0.4×缓冲系数)`。灵力高时散热降低，对寒冷耐受力强。
- **恢复**：`$恢复倍率 = 0.5 + 灵力值/100`。灵力越旺，伤口/精力恢复越快。
- **精力/精神**：灵力旺盛时，叙事上晓光能强撑更久、精神更稳固（AI 可在叙事里体现，不一定要数值化扣灵力）。

## AI 写法示例

晓光用灵力疗伤并扛着重担赶路，灵力从 45 消耗到 28（`<UpdateVariable>` 全量写法见《变量输出格式》）：

```yaml
晓光:
  狐类特性:
    灵力值: 28        # 主动消耗，AI 直接写新值
    # 灵力峰值不写——schema 自动同步
    # 灵力环境可写可不写——脚本会按灵力值回填
```

下一轮若晓光在灵脉丰沛处过夜，脚本会自动 +6（丰沛）+ 休息回灵，AI 不用算这部分。

## 重要规则

- **`灵力值` 是 AI 唯一该手写的灵力字段**（主动消耗时扣减）。`灵力峰值`/`灵力环境`/`$灵力*` 都不要手写。
- 环境回灵/掉灵交给脚本（写 `灵脉强度` + 触发 `$推进时段` 即可），AI 只管叙事和主动消耗。
- 灵力无上限——大胆让它在丰沛灵脉处涨上去，全盛态是晓光作为九尾狐的真正实力。
- 但也要让灵力有"用完的风险"：枯竭时晓光会变得脆弱，制造紧张感。
