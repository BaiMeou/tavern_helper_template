# 狩猎与采集系统

## 狩猎掷骰

当晓光尝试捕猎时，AI 用 insert（首次创建路径）或 replace 写 `$掷骰请求={ 类型:"狩猎", 时间:... }` 触发引擎掷骰（敏捷+感知影响骰值）。引擎将结果统一回写到 `$上次掷骰`，并写入 `$前端操作`/`$近期操作` 供叙事。AI 根据 `$上次掷骰` 结果叙事。

## 狩猎方式与难度

- **徒手/投石**：仅小型猎物（松鼠、松鸡）——成功率极低，敏捷要求高
- **简易钓钩**：被动垂钓——取决于水域鱼群密度·流速太快无法钓鱼
- **绳索陷阱**：小型猎物兔/松鸡——约25-35%/天（待机模式）
- **弹性拉索陷阱**：中型猎物鹿/野猪——约15-20%/天（需每日检查）
- **落穴陷阱**：大型猎物——制作耗时极长但捕获率高（约30%/天）

## 猎物处理

- 需要猎刀或斧头进行剥皮/分割
- 小型猎物一只约1-3kg肉
- 中型猎物一只约25-50kg肉——但单人无法一次搬运全部
- 肉在深秋常温下保存1-2天——需立即盐渍或熏制延长保存

## 采集

- 感知决定能否识别可食用植物/蘑菇
- 常见深秋可采集物：野莓(已过季)、坚果(松子/橡子——需处理去涩)、蒲公英根(可烤食)、某些耐寒蘑菇
- 每次采集记录可采集数量——同一区域不会无限产出
- 有毒植物识别：感知≥5可察觉异常气味/颜色。感知<3时有误食毒蘑菇风险

## 声学影响

- 晓光移动时噪音越大→猎物越早察觉逃跑
- 逆风接近猎物→气味不被察觉。顺风→猎物闻到狐味逃跑
- 在兽径旁静待→比主动追踪成功率更高但需要耐心
