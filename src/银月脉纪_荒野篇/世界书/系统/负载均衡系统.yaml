# 负载均衡系统

智力≥6时解锁。晓光能规划最优的物品放置方式以减少体力消耗并保持平衡。

## 身体各位置负重能力

| 位置 | 舒适上限 | 绝对上限 | 说明 |
|------|---------|---------|------|
| 手持 | 1kg | 3kg | 手臂最灵活但最易疲劳——长时间手持重物精力消耗×2 |
| 背包 | 6kg | 12kg | 登山背包的框架将重量传递到髋部——最有效率的载重方式 |
| 腰挂 | 1.5kg | 3kg | 靠近身体重心——对平衡影响最小。适合常用小物 |
| 尾藏 | 0.3kg | 1kg | 狐尾根部储存——不占空间且不影响平衡。仅适合极小件 |
| 颈间 | 0.1kg | 0.3kg | 项圈铃铛已是全部容量——不宜增加 |
| 穿着 | 2kg | 5kg | "穿着"的重量不计入体力消耗——衣物是"身体的一部分" |

## 均衡度判定

- **良好分布**：背包承载主要重量(40-60%)，腰挂补充轻量常用物，手持仅临时。移速惩罚最小
- **分布不均**：某位置承载超过总重60%——移速惩罚额外-5%
- **个别位置超载**：超出该位置绝对上限——移速惩罚额外-10%，疲劳加速×1.5

## 移速与体能效率

智力≥6的晓光会自动安排最优分布（在变量更新中体现）。AI在描述晓光的行动时应考虑负重分布的影响：

- 背包重+手持空→双手自由，可攀爬和使用工具
- 腰挂过重→步态受影响，跑动时拍打身体
- 尾藏太重→尾巴下垂，情绪也会受影响（不舒服的尾巴=不开心的狐狸）

## 与基础属性的联动

- 智力每增加2级(≥6后)：额外优化负载分布，体能效率+5%
- 体质每增加2级：各位置舒适上限+10%
- 敏捷：影响负重状态下闪避和攀爬的成功率修正

## 与灵力的联动（核心：灵力扛重）

负重惩罚现在并入**灵力体系**——灵力够高就能"扛重"，抵消失速惩罚。

- 负重速度修正会乘以 `$灵力缓冲系数 = clamp(1 − 灵力值/200, 0, 1)`：
  - 灵力 0 → 系数 1，负重惩罚全额（背一点就累）
  - 灵力 100 → 系数 0.5，负重惩罚减半
  - 灵力 200+ → 系数 0，负重惩罚归零（灵力顶着，背着远超体重的东西也走得动）
- 叙事上：灵力旺盛的晓光可以扛起常人不可能负担的重担；灵力枯竭时则和普通小女孩一样，一点重负就吃力。
- 灵力不会凭空消除"分布不均"的不适（腰挂过重拍打、尾藏太重尾巴下垂仍是体验问题），只是抵消失速惩罚。
- 详见《灵力系统》——灵力是核心资源+总开关，负重只是它弥补的众多限制之一。
