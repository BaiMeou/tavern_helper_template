# 生态法则

## 动植物分布

AI根据真实生态逻辑决定生物分布：

- **针叶林**：松鸡、松鼠、鹿、野猪、狼、熊（稀有）。松子、蘑菇、苔藓
- **溪流草甸**：鹿、水鸟、鱼类(小型)。水生植物、薄荷类药草、可食用根茎
- **碎石坡**：蛇(已冬眠)、岩羊、猛禽。几乎没有可食用植物
- **密林深处**：大型掠食者(狼/熊)、原始妖兽。稀有药草——但危险与收益并存

## 季节性

**深秋**（当前）：大部分植物枯萎——可采集物稀少。动物正在为冬眠做最后储备——活动频繁但警觉性极高。夜晚温度逼近零度。

**初冬**（约14-28天后）：开始降雪。部分动物冬眠(蛇/熊/部分妖兽)。水源冻结——需融雪取水。失温风险急剧上升。

**严冬**（约30-60天后）：如果没有充足储备和高级庇护所——几乎不可能在野外存活。

## 食物链

- 植物→小型食草动物(兔/松鸡/松鼠)→中型食肉动物(狐狸/獾)→大型掠食者(狼/熊)
- 晓光处于——既是掠食者(捕猎小型动物)也是潜在猎物(大型掠食者眼中)
- 妖兽独立于自然食物链之外——它们可能捕食任何东西

## 领地与竞争

- 狼群有固定领地——嚎叫是领地宣告
- 大型掠食者之间互相回避——熊和狼通常不会同时出现在同一区域
- 发现大型掠食者的领地标记(抓痕/粪便)→该区域风险升级
- 晓光可以主动回避领地——或冒险穿越(风险更大但可能发现更丰富的资源)
