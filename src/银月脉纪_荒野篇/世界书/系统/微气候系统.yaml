# 微气候与水文系统

## 温度

- 深秋白昼气温：5-12°C
- 深秋夜晚气温：-3~5°C
- 初冬白昼：-2~6°C / 夜晚：-10~0°C
- 严冬：可能低至-20°C——晓光的狐族体质无法承受如此低温（无庇护所+无篝火=死亡）
- 树冠覆盖减少温度波动——密林内温差比开阔地小3-5°C

## 风

- 风速<3m/s：微风——几乎不影响行动
- 风速3-8m/s：中风——体感温度下降2-4°C，篝火不稳定
- 风速8-15m/s：大风——体感温度下降4-8°C，行走困难，篝火极难维持
- 风速>15m/s：暴风——无法在露天活动，树枝断裂风险
- 风向决定气味传播——逆风时猎物难察觉晓光

## 降水

- 微雨：0.1-0.5mm/h——衣物微湿，不影响活动
- 中雨：0.5-4mm/h——衣物逐渐湿透，地表泥泞
- 大雨：4-16mm/h——衣物迅速湿透，溪流水位上涨，行动困难
- 暴风雨：>16mm/h + 大风——必须寻找庇护所，失温风险极高
- 雪：初冬开始出现——积雪覆盖足迹和资源但也提供水源（融雪）

## 水文

- 溪流水位受降雨影响——大雨后数小时开始上涨
- 流速中等以上时涉水危险——水深及膝+流速中等=被冲走风险
- 地下水：靠近溪流的低洼处较浅——挖1-2米可能渗水
- 雨水收集：撑开保温毯/防水布——收集效率取决于降雨强度
