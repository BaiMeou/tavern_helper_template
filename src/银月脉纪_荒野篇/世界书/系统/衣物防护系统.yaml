# 衣物防护系统

## 保暖值 (0-10)

每件衣物的保暖能力。层次叠加但非简单相加——外层防风、中间层保暖、贴身层排汗。

- 保暖值0-2：薄衬衫/单层衣物
- 保暖值3-5：厚卫衣/轻外套
- 保暖值6-8：厚外套/皮草
- 保暖值9-10：极地级防寒服

总保暖值 = 贴身层×1.0 + 中间层×0.8 + 外层×0.6（外层打折——主要是防风）

## 防风值 (0-10)

阻挡风冷效应的能力。风穿透衣物直接带走体表热量。

- 防风值<3：微风即可穿透
- 防风值3-6：中风中度渗透
- 防风值>7：有效阻挡强风

## 防水性

- **不防水**：微雨10分钟即湿透
- **防泼水**：微雨可撑30分钟，中雨很快渗透
- **防水**：可在大雨中保持干燥1-2小时
- **完全防水**：长时间暴雨中保持干燥——但透气性差、内部出汗

## 湿度影响

- 衣物湿度每增加10%→保暖值约-5%
- 湿透衣物保暖值降至原来的30-40%
- 湿衣物干燥所需时间：晴天通风处~2-3小时、阴天~半天到一整天、篝火旁~1-2小时
- 贴身层湿透是失温最快诱因——必须优先干燥

## 破损

- 破损度上升→保暖/防风值线性下降
- 破损度>50%：明显破口——风直接灌入
- 破损度>80%：基本失去防护功能
- 可用针线包/胶带临时修补——降低破损度但不完美
