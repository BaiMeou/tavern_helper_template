# 物理法则

AI在判断任何行动的可行性时必须遵守。

## 质量与材料

- 事物不会凭空出现或消失——制作消耗材料，材料重量转移至成品
- 材料有客观属性——硬木比软木耐烧、燧石可打火而石灰岩不可、藤蔓纤维强度低于尼龙
- 物品损坏不可逆——断裂的斧柄需要重新制作而非凭空修复

## 能量与体力

- 晓光的体力有限——连续3小时高强度劳作后必须休息
- 攀爬陡坡消耗 > 平地行走 > 静坐休息
- 负重超过安全上限时体力消耗加速
- 寒冷环境中维持体温额外消耗卡路里

## 热与火

- 火需要三要素：燃料+氧气+引火源（打火机/狐火火星/燧石敲击）
- 潮湿木材难以点燃且产烟多——需要先晒干或劈开用内部干燥部分
- 热量从高温向低温传导——篝火辐射温暖有效半径约1-2米
- 金属容器可直接加热——塑料/皮制容器不可

## 重力与地形

- 陡坡攀爬消耗体力+有坠落风险——坡度越大越危险
- 碎石坡稳定性差——攀爬时可能滑坡
- 泥泞地表行走消耗×1.5体力——容易滑倒
- 涉水过溪——水深及膝以上有被冲走风险（流速中等以上时）

## 水与湿度

- 衣物湿透后干燥需要热源+通风——深秋阴天可能一整天干不了
- 湿衣物保暖值大幅下降——是失温的主要诱因
- 水往低处流——寻找水源的最基本方法
- 生水≠安全水——肉眼清澈的水仍可能含寄生虫/细菌
