# 天体导航系统

## 太阳

- 深秋日出约06:47、日落约17:02——白昼仅约10小时
- 太阳东升西落——阴天时需通过其他方式判断方向
- 正午太阳在南方（北半球）——影子指向北方
- 深秋太阳高度角低——树影拉得极长

## 月亮

- 月相28天周期：新月→蛾眉月→上弦月→盈凸月→满月→亏凸月→下弦月→残月
- 满月：夜间能见度大幅提升——月光可辨。灵力波动可能增强
- 新月：夜间能见度极低——几乎漆黑。必须依赖听觉和嗅觉
- 残月：黎明前升起——后半夜有微弱月光

## 星座

- 深秋标志：猎户座清晰——腰带三星是导航基准
- 北斗七星——指向北极星。低垂于北面针叶林梢
- 北极星——正北。是所有导航的绝对参照

## 自然标记

- 苔藓通常生长在树木北侧（阴面）——但密林中此规律不绝对可靠
- 树冠不对称——南侧枝叶更茂盛（北半球）
- 蚁穴通常在南侧斜坡上
- 溪流流向——跟着溪流走终将到达更低海拔的人类活动区

## 时间感知

- 晓光没有钟表——通过太阳高度/饥饿感/困倦感判断时间
- 阴天无法看到太阳→时间感知偏差增大
- 主观时间感知写入`晓光.第六感.时间感知偏差`——AI据此调整叙事中的时间感
