# 前端交互系统

前端有一个选择弹窗组件。AI可以通过设置 `$前端选择` 变量来触发弹窗，让玩家做出选择。

## 触发方式

在变量更新中设置 `$前端选择`：

```json
{ "op": "replace", "path": "/$前端选择", "value": {
  "标题": "发现场景的描述",
  "选项": [
    { "id": "唯一标识", "名称": "物品名", "icon": "emoji", "描述": "简短描述", "重量": 0.0, "分类": "分类", "耐久度": 100 },
    ...
  ],
  "多选": true/false,
  "最大数量": 3
}}
```

## 何时触发

当晓光在探索中发现需要玩家决策的场景时：
- 发现了多个可拾取的物品，需要玩家选择带哪些
- 发现了可采集的植物/蘑菇，需要决定采集多少
- 在两个路径之间做选择（北面密林 vs 南面溪流）
- 发现特殊物品需要决定是否冒着风险获取

## 玩家响应

玩家在前端弹窗中选择后，选择的物品自动写入 `装备.物品栏`，选择结果写入 `$玩家选择`：

```json
{ "已选": ["物品名1", "物品名2"], "时间": "..." }
```

AI在下一轮回复中读取 `$玩家选择`，根据玩家的选择继续叙事。

## 重要规则

- 弹窗出现后玩家必须做出选择——AI应等待下一轮再推进剧情
- 选择结果同时写入 `$前端操作` 供AI参考
- 弹窗关闭后 `$前端选择` 自动清除
- 不要在一轮回复中触发多个弹窗——一次一个
- 拾取的物品重量计入当前负重
