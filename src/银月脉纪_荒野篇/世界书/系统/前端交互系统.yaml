# 前端交互系统

## 两个同步通道

前端 ↔ AI 之间有两个动态字段（schema 用 `.passthrough()` 放行，AI 可读写）：

1. **`$前端操作`**（字符串）——前端每次玩家操作都会写入，AI 据此理解"玩家刚才做了什么、为什么变量变了"。
2. **`$前端选择`**（对象）——AI 触发玩家选择弹窗时写入，玩家选择后前端清空它并把结果写入 `$玩家选择` + `$前端操作`。

另有引擎字段（脚本维护，AI 只读）：
- `$近期操作`（数组，最近 5 条）——AI 的滚动记忆，新写挤掉最旧。
- `$上次掷骰`——引擎掷骰回写（所有掷骰类型统一写此字段，含搜刮/狩猎/生火等）。
- `$当前负重`、`$失温风险等级`、`$体感温度`、`$总保暖值` 等——transform 派生的只读计算字段，**AI 不要手动写**，会被下次解析覆盖。

## 触发玩家选择弹窗

当晓光在探索中发现需要玩家决策的场景时（发现多件可拾取物、可采集植物、路径选择、营地部署、行动抉择等），AI 用 **`insert`**（首次创建路径，`replace` 会被 MVU 拒绝）写入 `$前端选择`。

弹窗支持**两种语义**，靠 `类型` 字段区分（省略时默认 `拾取`）：

### 类型一：拾取（`类型: "拾取"`，默认）—— 把选中物品落进物品栏

用于"发现一批物品让玩家挑捡"的搜刮/采集场景。

```json
{ "op": "insert", "path": "/$前端选择", "value": {
  "类型": "拾取",
  "标题": "溪边残骸——带哪些？",
  "多选": true,
  "最大数量": 5,
  "选项": [
    { "id": "破损渔网", "名称": "破损渔网", "icon": "🎣", "描述": "可改作陷阱或滤网", "重量": 0.3, "分类": "材料", "易损度": 5 },
    { "id": "锈工具箱", "名称": "锈蚀工具箱", "icon": "🧰", "描述": "螺丝刀+扳手，锈蚀但能用", "重量": 1.2, "分类": "工具", "耐久度": 35, "损坏标签": "少耐久", "可修理": true, "易损度": 5 },
    { "id": "易拉罐x2", "名称": "易拉罐×2", "icon": "🥫", "描述": "金属容器，可改作炊具", "重量": 0.1, "分类": "材料", "数量": 2 },
    { "id": "碎玻璃", "名称": "碎玻璃片", "icon": "🧊", "描述": "锋利——可作切割工具或矛尖", "重量": 0.05, "分类": "材料", "材料类型": "塑料", "耐久度": 0, "损坏标签": "损坏", "可拆解": true },
    { "id": "半袋米", "名称": "半袋大米", "icon": "🍚", "描述": "受潮但未变质，约1kg", "重量": 1.0, "分类": "食物", "数量": 1, "保质期天": 30 },
    { "id": "破收音机", "名称": "破收音机", "icon": "📻", "描述": "摔坏了，但电池/喇叭/电路板可拆", "重量": 0.4, "分类": "电子", "耐久度": 0, "损坏标签": "损坏", "可拆解": true, "易损度": 30 }
  ]
}}
```

玩家确认后，选中项**自动写入 `装备.物品栏`**，重量计入 `$当前负重`。

### 类型二：行动（`类型: "行动"`）—— 只回传玩家选择，不落物品栏

用于"非物品的决策"：营地先建什么、走哪条路、追不追猎物、要不要冒险救人等。每个选项就是一个**行动方案**，不是物品。

```json
{ "op": "insert", "path": "/$前端选择", "value": {
  "类型": "行动",
  "标题": "营地优先布置——先做什么？",
  "多选": false,
  "选项": [
    { "id": "搭庇护所", "名称": "搭建庇护所", "icon": "🏠", "描述": "天黑前赶出能挡风的住处，过夜不挨冻" },
    { "id": "生篝火", "名称": "生火取暖", "icon": "🔥", "描述": "先解决取暖和烧水，但要消耗燃料和时间" },
    { "id": "处理猎物", "名称": "先处理獠猪", "icon": "🥩", "描述": "血腥味会引来掠食者，但肉放久了会坏" }
  ]
}}
```

行动模式下：玩家选定后，前端**只**写 `$玩家选择`（含 `类型:"行动"` 与已选方案）和 `$前端操作`，**不**碰物品栏。AI 据此推进对应剧情分支。

### 弹窗字段说明

- `最大数量`：玩家最多能捡几件，默认 **5**（不是 2）。AI 应根据场景设合理上限（搜刮残骸可给 5，路过野果丛可给 3）。
- `损坏标签`：`完好` / `少耐久` / `部分损坏` / `损坏`。前端会显示对应彩色标签。
  - `损坏` 的物品耐久归零、自动标 `可拆解`——玩家可捡来拆零件（电池/铜线/金属片等）。
  - `部分损坏` 标 `可修理`——捡回去能用材料修。
  - `少耐久`——直接能用，只是耐久打折。
- `耐久度`：0-100，破损物品的真实剩余耐久。
- `易损度`：物品的脆弱程度（金属低、电子/玻璃高），仅作展示参考。
- `可修理` / `可拆解`：布尔，控制前端是否显示对应提示。

### 弹窗字段透传

弹窗组件会把以下字段透传到物品栏（白名单）：`名称/分类/重量/位置/描述/耐久度/数量/容量/当前容量/保质期天/锋利度/电量/使用次数剩余/保暖值/防风值/防水性/湿度/破损度/燃烧时长分钟/结构强度/材料类型/易损度/损坏标签/可修理/可拆解`。

所以**容器/衣物/电子/精密武器的复杂属性也能通过弹窗落库**了——不再需要绕开弹窗直接 insert。但仍建议：极复杂的全新制作产物（带配方解锁逻辑的）走直接 insert 更稳妥。

## 玩家响应

玩家在弹窗中选择后，前端根据 `类型` 自动处理：

**拾取型**：
1. 把选中物品写入 `/装备/物品栏/<id>`（位置默认 `背包`），重量计入 `$当前负重`。
2. 写入 `$玩家选择` = `{ 类型:"拾取", 已选:[...], 时间:... }`。
3. 追加一条到 `$近期操作`，并写 `$前端操作` 描述本次拾取。
4. 清空 `$前端选择`。

**行动型**：
1. **不**写物品栏。
2. 写入 `$玩家选择` = `{ 类型:"行动", 已选:[{id,名称}], 时间:... }`。
3. 追加一条到 `$近期操作`，并写 `$前端操作` 描述本次决策。
4. 清空 `$前端选择`。

AI 在下一轮读取 `$玩家选择`（含 `类型` 字段区分两种语义）和 `$前端操作`，据此继续叙事。**若 `$玩家选择.类型` 是 `行动`，不要再去物品栏找新物品——那是玩家的决策意图，不是实物。**

## 前端玩家操作（位置调整、添柴、取水等）

玩家在前端调整物品位置、生火、取水等操作时，前端会写 `$前端操作`，格式如：

- `玩家将「猎刀」从背包移动到腰挂`
- `玩家从金属水壶饮用了 0.3L 煮沸水 → 口渴 48%↑55%`
- `玩家添柴 → 篝火燃料余量 +30min`

AI 应把这些当作"已发生的玩家动作"融入叙事，不要重复描述成晓光自己决定做的。

## 引擎掷骰（AI 请求 → 脚本执行 → 回写结果）

复杂判定（搜刮存活、狩猎成败、铃铛回响、饮生水患病、生火、攀爬）由引擎掷骰保证公平。AI 想触发时，用 **`insert`**（首次创建路径，`replace` 会被 MVU 拒绝；该字段每次用完会被引擎清空但保留键，二次起 replace 亦可，统一用 insert 最稳）写：

```json
{ "op": "insert", "path": "/$掷骰请求", "value": { "类型": "搜刮", "物品": [...], "时间": "第3天 16:58" }}
```

类型取值：`搜刮` / `狩猎` / `铃铛` / `饮生水` / `生火` / `攀爬`。
各类型特殊参数：
- 生火：`雨天`(布尔，雨天=true)、`引火物`(布尔，有引火物=true)。示例：`{ 类型:"生火", 雨天:false, 引火物:true, 时间:... }`
- 搜刮：`物品`(数组，必填——列出本次要掷骰判定的候选物品)。掷骰只产出每件物品的完好度判定（完好/少耐久/部分损坏/损坏），供 AI 叙事；**真正的拾取由 AI 用 `$前端选择` 弹窗让玩家挑捡**，引擎不再自动把物品塞进物品栏。
脚本掷骰后会把结果写入 `$上次掷骰`，并追加到 `$近期操作` + 写 `$前端操作`，AI 据此叙事。**不要让 AI 自己用 Math.random 掷骰**——统一走引擎。
（注：陷阱不走即时掷骰——陷阱布置后由引擎在过夜结算中按陷阱类型概率自动判定捕获，AI 无需写陷阱掷骰请求。）

## 物品制作（AI 直接改物品栏，无引擎合成）

制作已解锁配方时，**AI 直接在 `<UpdateVariable>` 里改物品栏**：扣材料（减数量/删条目）、加产物（新增或叠加）。不再有 `$合成请求` 触发器、没有脚本合成引擎了——材料/智力是否达标由 AI 按配方自行判断，材料不足就叙事上"发现还差什么"。详见《制作系统》。

## 推进时间与代谢（$推进时段）

当剧情需要让时间流逝并结算生存代价时，AI 写 `$推进时段` 触发引擎代谢结算。**合法取值仅三个**：

- `次日`——过夜结算：天数+1、时段置清晨、按缺口消耗体脂、重置今日摄入、睡眠恢复、伤口愈合推进、食物腐败、篝火熄灭、陷阱每日判定。
- `黄昏` / `夜晚`——单时段代谢消耗：饥饿/口渴/精力下降，体温受失温风险影响。

```json
{ "op": "insert", "path": "/$推进时段", "value": "次日" }
```

其它时段切换（如黎明→清晨→正午→午后等无结算的纯叙事推进）**不要写 `$推进时段`**，直接改 `世界.时间.时段`。写入未列出的值会被引擎清空但不做任何结算（时间看似推进却毫无变化）。

## 重要规则

- 弹窗出现后玩家必须做出选择——AI 应等待下一轮再推进剧情
- 不要在一轮回复中触发多个弹窗——一次一个
- 拾取的物品重量自动计入 `$当前负重`
- `$` 开头的字段大多是引擎维护的只读/触发字段，AI 只读不写（除非是 `$掷骰请求`、`$推进时段`、`$前端选择` 这类触发器，首次用 insert 创建）
- 物品制作不再有触发器——AI 直接在 `<UpdateVariable>` 里改物品栏（扣材料、加产物）
- 灵力主动消耗也是 AI 直接写 `晓光.狐类特性.灵力值`（详见《灵力系统》）
