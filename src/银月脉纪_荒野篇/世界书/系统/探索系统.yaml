# 探索系统

## 搜刮（地点探索，AI 驱动）

搜刮不再是固定按钮掷骰，而是**到遗迹/物资点/坠机残骸等"物品密集"的地点时才触发**的场景。普通路过不搜刮——只在"值得翻找"的地方展开。

当晓光到达这类地点：
1. AI 叙事上描述她发现了哪些可拾取物（可先写 `$掷骰请求={类型:"搜刮", 物品:[...]}` 让引擎掷骰判定每件物品的完好度——感知越高越容易发现好东西）。
2. 引擎把完好度判定回写 `$上次掷骰`，AI 据此叙事（"金属箱摔变形了，但里面的螺丝刀还能用"）。
3. 然后用 `$前端选择`（拾取型）弹窗让玩家挑捡带哪些——玩家确认后选中物自动入物品栏。
4. 搜刮过的地点应在叙事/地标里标记为"已搜刮"，避免重复翻找。

掷骰范围：感知属性影响骰值偏正（感知越高越容易发现好东西）

## 发现新地标

当晓光探索到值得记录的新地点时：
1. 更新`世界.地形.当前位置`
2. 如果是重要地标，创建`世界.地标`新条目
3. 更新`世界.地势`的坡度/地表类型/路径质量
4. 更新`环境感知`中的声学和气味信息（新环境可能完全不同）

## 移动后更新地标距离（重要）

晓光一旦移动到新位置，**所有已知地标的 `距离` 字段都应随之刷新**——不要让地标永远停留在初发现时的距离/措辞。

- 移动后，把当前所在地的地标 `距离` 改为 `"0m (当前所在)"`，其余地标按新相对方位重估距离（如原"约200m"的溪流，北移后可能变成"约120m 南"）。
- **"当前所在"只属于此刻脚下那一处地标**——离开后必须改写它的距离，不能让"飞机残骸 0m 当前所在"这种死值一直挂着。
- 同时更新 `世界.地形.当前位置` 与四向地形（`北方/南方/东方/西方`）的描述。
- 这保证前端罗盘和地标列表能反映真实位置，而不是卡在初始值。

## 资源识别

- 感知≥3：可识别明显的资源——地表水源、显眼的可食用植物
- 感知≥5：可识别隐藏的资源——石缝中的药草、树上的鸟巢、地上的足迹
- 感知≥7：可识别稀有资源——优质燧石露头、黏土矿、隐蔽的蜂巢
- 智力联动：智力越高，越能从模糊线索中推断资源位置

## 迷路判定

以下情况增加迷路风险：
- 深入密林远离地标
- 大雾/暴雨/暴风雪导致能见度极低
- 夜间移动
- 慌乱中奔跑

迷路=世界.地势.迷路风险提升+可能回到已经过的地方。降低迷路风险：沿途标记(炭枝在树上画箭头/堆石堆)、跟随溪流、记住天体方位。
