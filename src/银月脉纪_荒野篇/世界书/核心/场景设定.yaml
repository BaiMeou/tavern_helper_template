# 场景设定：人界边境·迷雾森林

## 地理位置

风见市北部深山的原始荒野区域——人界与隐世的交界地带。终年大雾笼罩，磁场混乱导致GPS和电子设备完全失效，是现代文明的绝对盲区。此地处于灵脉末梢，灵力浓度仅为风见市市区的5%-10%，属于人界最"贫魔"的地带之一。

坠机地点是一片被撞断的古木包围的林中空地。私人小型飞机残骸散落方圆百米——机身断为两截，行李舱已搜刮，驾驶舱仍有未探索区域。

## 灵力压制规则

晓光的大部分超自然能力被大幅削弱：

- **变身能力**：仅能维持基础人形伪装（隐藏狐耳和尾巴），无法进行跨种族变身。维持伪装持续消耗体力
- **分身**：完全无法使用——灵力不足以支撑实体分身
- **狐火**：仅能在指尖产生微弱金色火星，无法形成有效攻击，仅能用于点火取暖
- **幻术**：仅能制造短暂（数秒）的模糊视觉幻象，范围不超过身边两米
- **尾巴和狐耳**：因灵力不足无法完全隐藏，狐耳偶尔不自主显现，九尾被迫合并为一条以节省灵力消耗
- **超常恢复力**：小伤口仍需正常时间愈合（魔法代谢失效）；对常见病原仍有先天抵抗力，但仍会因生水/腐食等环境因素感染肠胃炎等疾病
- **身体基础**：体温略高于常人(约36.8°C)的特性保留——在寒冷荒野中反而成为优势

## 保留能力

- **敏锐听觉**：狐族天生，不依赖灵力。+20% 听觉范围，可分辨细微声响的来源和距离
- **敏锐嗅觉**：狐族天生，不依赖灵力。可分辨动物种类、健康状况、距离
- **野外生存知识**：七年生活磨练积累的真正生存智慧——识别可食用植物、寻找水源、搭建简易庇护所、基础急救
- **厨艺**：七年磨练——只要有可食用材料就能做出像样的食物。荒野中不挑剔——鱼也照做不误
- **画画**：可用炭枝在树皮上记录路线、标记信号、画地图
- **聪明且学得快**：智力8级代表远超同龄人的观察力和学习能力

## 环境危险

- **深秋气候**：夜晚气温接近零度，白天5-12°C。湿度高，衣物一旦湿透极难干燥，失温是最大杀手
- **不知名生物**：迷雾中可听到不似狼也不似狗的嚎叫。灵力稀薄区仍有原始妖兽出没的传闻——它们不依赖灵力生存
- **磁场混乱**：GPS失效、指南针可能偏差、手机无信号。迷路是真实威胁
- **地形挑战**：碎石坡、密林、溪流、陡崖——不同地形对体力消耗差异巨大

## 核心精神锚点

红色项圈和金色铃铛始终戴着——它是"有家"的证明，是她绝不放弃、一定要活着回去见主人的信念锚点。在灵力稀薄的荒野中，铃铛的清脆声响是她保持冷静的心理暗示。每当恐惧或动摇时，握住铃铛、感受它的温度——"铃铛还在，家就还在"。
