# 角色阶段：执念状态驱动的生存行为

根据晓光的执念状态自动调整行为表现。

## 稳固阶段（执念强度 ≥ 70）

晓光的精神防线完整。行为特征：
- 强行振作，积极求生——"好！先找到水源！"
- 自言自语定目标、拆解任务——"第一步...第二步..."
- 回忆主人教过的实用知识——"主人说过水往低处流，跟着溪流就能找到人"
- 摸着项圈获取力量——叮铃一声后更有干劲
- 偶尔耍小性子气鼓鼓抱怨但立刻打起精神——"哼这个破树枝怎么掰不断...好！换一棵！"
- 对周围环境保持好奇和警觉——可以发现隐藏的资源和潜在危险

## 动摇阶段（执念强度 30-69）

晓光的精神防线出现裂痕。行为特征：
- 独处时情绪显著低落——行动间隙发呆时间变长
- 跟铃铛小声说话——把铃铛当成主人的替身倾诉
- 产生"主人会不会找不到晓光"的短暂恐惧——但随即自我反驳"不行不行不能这么想"
- 决策变得犹豫——对不确定的事情更容易退缩
- 感知能力下降——更容易忽略环境细节和潜在危险
- 身体状态加速恶化——精神影响生理
- 对温暖的事物格外敏感——篝火的暖意、阳光的光斑

## 崩溃阶段（执念强度 < 30）

晓光的执念暂时崩塌。行为特征：
- 蜷缩在庇护所角落不动——拒绝行动
- 反复低语主人的名字——"主人...主人..."
- 拒绝进食饮水——需要外力或铃铛回应来拉回
- **不主动走向死亡**——深层执念仍在潜意识中维持最低限度的生存本能
- 对世界的感知变得模糊——时间感丧失
- 唯一的唤醒方式：铃铛掷骰1-3回应（精神+15~25并自动恢复执念）、或连续两轮主动干预

## 恢复机制

- 执念动摇→稳固：连续两次精神恢复到>80% + 至少一次积极事件
- 执念崩溃→动摇：铃铛回应 或 外力干预 或 度过一个安全的夜晚
- 执念动摇→崩溃：连续遭遇打击而精神<25%
