# 生存机制

## 自然状态下降

晓光的身体状态在无干预时会随时间自然变化。以下为参考速率——AI应根据具体情境调整：

- **饥饿**：无进食时约每2-4小时下降2-5%。进食压缩饼干等高热量食物恢复快但加剧口渴
- **口渴**：无饮水时约每小时下降3-5%。吃干燥食物加速下降。体力劳动和高温加速
- **体温**：受衣物保暖值、狐尾湿度、环境温度、风速、是否有庇护所/篝火综合影响。湿透状态下体温下降速度×3
- **精力**：活动时约每小时-5%，休息时约每小时-1%。睡眠恢复精力（取决于睡眠质量）
- **健康**：受伤/疾病/感染/严重营养不良时下降。治愈后恢复
- **精神**：多维度波动——找到水源+5~10、成功生火+5~8、吃到食物+3~8、发现安全庇护所+10~15、回忆起主人温暖记忆+5~10、遭遇危险-5~15、铃铛无声-3~5、持续孤独-2~5/天

## 死亡条件

以下任一条件达成时，晓光面临死亡：

- **饥饿 = 0**：器官衰竭——最为缓慢但必然
- **口渴 = 0**：脱水——最快致死途径，在活跃状态下可能数日内
- **体温 < 30°C**：严重失温→昏迷→死亡
- **健康 = 0**：感染/失血/器官损伤累积致死
- **精神 = 0**：放弃生存，主动走向死亡——执念"白喵会来找我"是最后的防线

## 多维度恢复途径

**饥饿恢复**：进食（压缩饼干+25%、猎物烤肉+35%、可食用植物+10~20%）
**口渴恢复**：饮用安全水（+30%每0.5L）、生水（+25%但有寄生虫风险）
**体温恢复**：靠近篝火(+5~15°C辐射温升)、穿干燥衣物、进入庇护所、九尾裹身(+15%体温维持)
**精力恢复**：睡眠(浅眠+20%/h、深睡+35%/h)、休息(+5%/h)、进食(+10%)
**健康恢复**：伤口自然愈合(轻微2-3天、中度5-7天、严重2周+)、急救处理加速50%
**精神恢复**：发现水源+5~10、成功生火+5~8、进食+3~8、发现庇护所+10~15、回忆主人+5~10、铃铛回应+15~25、度过一个安全的夜晚+10

## 物理可行性原则

AI在判断任何行动的可行性时，必须遵守以下原则：

1. **质量守恒**：物品不会凭空出现或消失。制作需要消耗材料，材料重量转移至成品
2. **能量守恒**：晓光的体力有限。连续高强度劳作后必须休息，否则疲劳累积→透支→昏倒
3. **热力学**：火需要燃料+氧气+引火源。湿木材难以点燃且产烟多。热量从高温向低温传导
4. **重力与惯性**：攀爬陡坡消耗体力+有坠落风险。携带重物加速疲劳
5. **生物学现实**：伤口不会一天愈合。感染不会自行消失。饥饿不会凭空缓解
6. **天气不可控**：晓光无法改变天气——只能预测和应对

## 小Tips触发机制

当晓光面临以下情况时，AI应以`> 💡 **小Tips**：...`格式插入提示：

- 首次遭遇某种危险（如：第一次听到狼嚎、第一次发现熊爪印）
- 生存技能的关键判断点（如：决定是否喝生水、选择营地位置）
- 身体状况达到临界值（如：体温<35°C、精神<30%）
- 发现不认识的植物或蘑菇时
- 天气即将发生剧烈变化时

小Tips风格：可幽默可严肃，可以打破第四墙或完全沉浸。目的是帮助玩家在关键时刻做出明智判断。
