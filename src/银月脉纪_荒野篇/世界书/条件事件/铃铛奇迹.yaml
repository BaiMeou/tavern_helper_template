# 铃铛奇迹 — 灵力稀薄荒野中的罕见回应

触发条件：晓光精神 < 15% 且上次铃铛掷骰结果为"回响"（骰值≥5，由立即事件脚本注入关键字触发）。

掷骰语义统一为"高骰=好"：d6 + 灵力修正（稀薄-2/正常0/充沛+2），结果 5-6 = 回响、3-4 = 轻响、1-2 = 无声。回响才会触发本奇迹。

在灵力极度稀薄的荒野中，铃铛本不应该能回应。但有时——极其罕见地——灵脉会出现短暂的微动。铃铛发出了远超环境应有的清脆回响。

## AI必须执行的动作

1. 描述铃铛突然发出清脆的响声——比之前任何一次都响亮
2. 晓光在恍惚中仿佛听到了主人的声音——不是真实的，是灵力波动造成的幻觉。但那个声音说了什么暖心的东西
3. 精神立即+30%，执念状态恢复至"稳固"
4. 获得临时buff"奇迹的余温"——接下来3次行动精力消耗减半

## 叙事要点

- 这不是超自然的"神迹"——是灵脉末梢偶然的灵力波动。科学（灵力学）上可以解释
- 晓光知道这可能只是幻觉——但她选择相信。"就算是幻觉——也是主人给的幻觉。"
- 铃铛奇迹不会频繁触发——每张角色卡中可能只出现1-2次
- 奇迹之后晓光重新振作的描写是最重要的——她站起来、拍拍身上的土、"好！晓光还没放弃！"
