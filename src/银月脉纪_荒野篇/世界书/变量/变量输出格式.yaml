---
变量输出格式:
  rule:
    - 你必须在每次回复的末尾输出变量更新分析与实际更新命令。
    - **本卡采用「全量输出」——不是增量。** 每一轮都要把整份 stat_data 重新审视一遍并整体写回，防止增量更新时漏改某些字段（如「今天没吃东西却还说吃了」那种遗漏）。
    - 更新命令遵循 JSON Patch (RFC 6902) 风格，但用"按顶层分组整体 replace"实现全量：对每个顶层对象各发一条 replace 操作，value 是该分组的**完整对象**。
    - 顶层分组共 7 个（每个都是完整对象，逐项重写）：`/晓光`、`/世界`、`/装备`、`/工坊`、`/图鉴`、`/营地`、`/环境感知`
    - 支持的操作:
      - replace: 替换现有路径的值（全量输出时，每个顶层分组用一条 replace 整体覆盖）
      - delta: 更新现有数字路径的增量值（仅在你只想微调某数字、不想重写整组时用；但全量优先）
      - insert: 向对象插入新条目（用于 $掷骰请求、$推进时段、$前端选择 等触发器，首次创建路径）
      - remove: 删除路径
      - move: 移动路径
    - **不要输出任何以 $ 开头的派生字段**——它们是 schema transform 计算的只读字段（如 $体感温度、$当前负重、$失温风险等级、$总保暖值、$灵力等级、$恢复倍率、$灵力缓冲系数、$灵力满格参考、$移动速度总修正、$精神区间 等），写了也会被下次解析覆盖。例外：$掷骰请求、$推进时段、$前端选择 是 AI 触发器，用 insert 创建。
    - 不要输出以 _ 开头的字段——它们是内部字段。
    - $待搜刮货舱（非派生、是持久参考数据）保留即可，一般不动它。
    - **全量输出时仍要遵守各字段的更新规则**（见《变量更新规则》）：不是每轮都该变的字段就保持原值写回，该变的按规则变。全量的意义是"每个字段都重新过一遍脑子"，不是"每个字段都变"。
    - 创建新物品/野兽/草药/地标条目时，在该分组对象里直接写出新条目（record 的一个新 key）即可——全量 replace 自然包含它，不用单独 insert。
    - 主动消耗灵力时，直接在 /晓光 对象里写 狐类特性.灵力值 的新值（不要写 灵力峰值/灵力环境/$灵力* ）。
    - 物品制作时，直接在 /装备 对象里改 物品栏（扣材料、加产物），不再用 $合成请求。
  format: |-
    <UpdateVariable>
    <Analysis>$(IN ENGLISH, no more than 80 words)
    - ${time passed since last update: ...}
    - ${decide whether dramatic updates are allowed based on time passed and situation: yes/no}
    - ${逐项分析每个顶层分组的关键变化：晓光(体征/灵力/伤口...)、世界(时间/天气/地形...)、装备(物品栏/负重...)、工坊(配方/陷阱...)、图鉴(新发现?)、营地(庇护所/篝火...)、环境感知(声学/气味...) —— 没变的也要确认"保持原值"}
    </Analysis>
    <JSONPatch>
    [
      { "op": "replace", "path": "/晓光", "value": { /* 完整晓光对象：基础属性/生存状态/属性成长/营养代谢/伤口/疾病/疲劳/狐类特性(含灵力值)/执念/睡眠/第六感/生理状态 —— 不含任何$字段 */ } },
      { "op": "replace", "path": "/世界", "value": { /* 完整世界对象：时间/地形(含灵脉强度)/地势/地标/天气详情/水文/天体 */ } },
      { "op": "replace", "path": "/装备", "value": { /* 完整装备对象：负重/物品栏/容器/衣物/手持/穿着 */ } },
      { "op": "replace", "path": "/工坊", "value": { /* 完整工坊对象：配方/陷阱 */ } },
      { "op": "replace", "path": "/图鉴", "value": { /* 完整图鉴对象：野兽/草药/足迹/日志 */ } },
      { "op": "replace", "path": "/营地", "value": { /* 完整营地对象：庇护所/篝火/储水/食物库存 */ } },
      { "op": "replace", "path": "/环境感知", "value": { /* 完整环境感知对象：声学/气味 */ } },
      /* 若需触发引擎，追加 insert（触发器用完会被清空，不影响全量）：
      { "op": "insert", "path": "/$推进时段", "value": "次日" },
      { "op": "insert", "path": "/$掷骰请求", "value": { "类型": "生火", "雨天": false, "引火物": true, "时间": "第3天 17:20" } },
      { "op": "insert", "path": "/$前端选择", "value": { "类型": "拾取", "标题": "...", "多选": true, "最大数量": 5, "选项": [...] } } */
    ]
    </JSONPatch>
    </UpdateVariable>
  全量输出要点:
    - 每轮 7 条 replace，覆盖全部顶层分组——缺一不可。没变化的分组也照原样写回（确认"审视过了，不变"）。
    - 不要漏字段：每个分组对象里所有非$字段都要在。漏写 = 该字段被清空。
    - 数字字段写绝对值（不是 delta）：如 饥饿 从 65 变到 60，写 "饥饿": 60，不是 delta -5。
    - 灵力值 是你要手写的（主动消耗时扣减）；灵力峰值/灵力环境/$灵力* 都不要写。
    - $体感温度/$当前负重/$失温风险等级 等派生字段一律不写——schema 会自动算。
    - 触发器($推进时段/$掷骰请求/$前端选择)按需 insert，是全量之外的额外操作，用完引擎会清空。
