---
变量更新规则:
  晓光:
    基础属性.${体质|敏捷|智力|意志|感知}:
      type: number
      range: 1~20
      check:
        - 极少变动——仅在XP攒满当前等级阈值时由脚本自动升级（阈值随等级递增，Lv1=100、每级×1.15，如Lv5≈175/Lv10≈352/Lv19≈1238）
        - 智力初始8级——代表七年生活磨练的生存智慧
        - 不要手动更改基础属性值——它们由XP系统自动管理

    属性成长.${体质XP|敏捷XP|意志XP|感知XP}:
      type: number
      range: 0~99999
      check:
        - XP增长极为稀缺——不是每轮对话都需要更新。仅在发生值得记录的显著事件时才增加
        - 体质XP：连续数小时负重行军后+3~8、在严重伤病中活下来+8~15、成功抵抗疾病+5~10。普通行走/普通劳作不增加
        - 敏捷XP：首次成功攀爬陡坡+5~10、成功捕获敏捷猎物(如松鸡/兔)+8~12、在危急中闪避野兽攻击+10~15。日常跑步不增加
        - 意志XP：在精神临界区(25-49%)挺过一次危机+10~15、独自度过恐怖夜晚且精神未崩溃+5~10、执念从动摇恢复到稳固+8~12。日常孤独不增加
        - 感知XP：首次发现隐藏资源(如石缝中的药草/远处的兽径)+5~8、成功追踪猎物超过1小时+8~12、提前预警并避开了一次危险遭遇+10~15。普通观察不增加
        - 关键原则：只在"做成了之前没做过的事"或"在极端条件下挺了过来"时给XP。重复性日常不产生XP
        - 单次XP增加通常在3~15之间——慎重给予。智力XP不需要管理（智力起始8级且无XP条）
        - 当XP攒满当前等级阈值时脚本自动升级（阈值随等级递增，见基础属性说明）——AI只需累加XP值，无需判断升级

    生存状态.饥饿:
      type: number
      range: 0~100
      check:
        - 无进食时每2~4小时 -2~5
        - 食用压缩饼干 +20~25（但因极度吸水，口渴额外-5~10）
        - 食用烤猎物肉 +30~40
        - 食用可食用植物 +10~20
        - 饥饿<20时身体开始消耗体脂储备
        - 饥饿=0触发器官衰竭死亡

    生存状态.口渴:
      type: number
      range: 0~100
      check:
        - 无饮水时每小时 -3~5
        - 饮安全水 +25~30（每0.5L）
        - 饮生水 +20~25（每0.5L，但有寄生虫风险→可能降低健康）
        - 吃干燥食物额外 -5~10
        - 活跃劳动额外加速下降
        - 口渴=0触发脱水死亡（最快致死途径）

    生存状态.体温:
      type: number
      range: 30~43
      check:
        - 正常体温约36.8°C——狐族体质略高于常人
        - 受衣物总保暖值、风速、湿度、是否有篝火/庇护所综合影响
        - 湿透状态体温下降速度×3
        - 篝火附近+5~15°C辐射温升（取决于火势和距离）
        - 庇护所内+3~8°C（取决于庇护所类型）
        - 体温<35°C：轻度失温——手脚发冷、颤抖
        - 体温<32°C：中度失温——思维迟钝、无法精细操作
        - 体温<30°C：严重失温→昏迷→死亡

    生存状态.精力:
      type: number
      range: 0~100
      check:
        - 活动时每小时 -5（重体力加倍）
        - 休息时每小时 -1（坐着/躺着）
        - 浅眠恢复 +15~25/h
        - 深睡恢复 +30~40/h
        - 进食恢复 +8~15
        - 精力<20：行动效率显著下降
        - 精力=0：无法行动，必须休息

    生存状态.健康:
      type: number
      range: 0~100
      check:
        - 伤口/疾病/感染/营养不良累积时下降
        - 伤口愈合后逐步恢复
        - 饮用生水有概率 -5~15（寄生虫/细菌感染）
        - 健康<50：免疫力和恢复能力显著下降
        - 健康=0：感染/失血/器官损伤致死

    生存状态.精神:
      type: number
      range: 0~100
      check:
        - 发现水源+5~10、成功生火+5~8、进食+3~8、发现庇护所+10~15
        - 回忆主人温暖记忆+5~10、铃铛清脆声响+3~5
        - 遭遇危险-5~15、受伤-5~8、持续孤独每天-2~5
        - 80~100%：稳定——正常决策
        - 50~79%：压抑——偶有幻觉、可控制
        - 25~49%：临界——铃铛易自动触发、决策偏执
        - 0~24%：崩溃——放弃生存、追逐幻觉
        - 精神=0：主动走向死亡——执念是最后防线

    营养代谢.今日摄入.${卡路里|蛋白质克|脂肪克|碳水克}:
      type: number
      check:
        - 每天黎明时重置今日摄入为0
        - 进食时根据食物类型增加对应营养值
        - 压缩饼干(每块)：卡路里+300、碳水+55g、蛋白质+6g、脂肪+8g
        - 烤猎物肉(每100g)：卡路里+200~250、蛋白质+25~30g、脂肪+10~15g
        - 可食用植物：卡路里+30~80、碳水+5~15g、纤维为主
        - 仅记录——AI判断晓光是否营养均衡

    营养代谢.体脂储备:
      type: number
      range: 3~50
      check:
        - 长期卡路里摄入<基础代谢率时缓慢下降
        - 饥饿<20时开始消耗体脂——每消耗3500kcal体脂储备-1%
        - 体脂<5：极度消瘦——免疫力下降、畏寒加剧

    营养代谢.蛋白质平衡:
      type: number
      check:
        - 正=合成肌肉和修复组织。负=分解肌肉供能
        - 持续蛋白质摄入不足时为负——伤口愈合减慢、肌肉流失

    伤口:
      type: |-
        {
          [伤口标识: string]: {
            位置: string;
            类型: '割伤'|'擦伤'|'挫伤'|'骨折'|'冻伤'|'烧伤'|'刺伤'|'扭伤'|'拉伤';
            严重度: '轻微'|'中度'|'严重'|'危急';
            愈合阶段: '出血'|'凝血'|'结痂'|'愈合中'|'已愈合'|'留疤';
            感染风险: '低'|'中'|'高'|'已感染';
            对行动影响: string;
            处理方式: string;
            预计愈合天数: number;
            受伤天数: number;
          }
        }
      check:
        - 晓光受伤时创建新伤口条目
        - 受伤天数随天数递增
        - 愈合阶段按预计天数推进——处理得当加速、感染则延缓
        - 已愈合的伤口保留留疤记录（不删除——是晓光的生存勋章）
        - 轻微伤2-3天愈合、中度5-7天、严重2周+、危急需急救护理

    疾病:
      type: |-
        {
          [病名: string]: {
            症状: string;
            严重度: '潜伏期'|'轻微'|'中度'|'严重'|'危急';
            阶段: string;
            传染性: '无'|'低'|'中'|'高';
            处理方式: string;
          }
        }
      check:
        - 饮生水→寄生虫风险。吃腐烂食物→食物中毒。伤口感染→败血症风险
        - 不自动创建疾病——仅在明确病因时创建
        - 疾病随处理方式推进阶段——可能是好转或恶化

    疲劳:
      type: |-
        {
          肌肉疲劳: number; // 0-100%
          睡眠债务: number; // 0-48h
          累积负荷: '轻松'|'正常'|'疲惫'|'透支'|'极限';
        }
      check:
        - 每1小时活跃劳作：肌肉疲劳+5~10、睡眠债务+0.5~1
        - 睡眠减少睡眠债务——深睡效率×2
        - 累积负荷根据肌肉疲劳+睡眠债务综合判定
        - 透支状态：行动效率-30%。极限：行动效率-60%+有昏倒风险

    狐类特性.狐尾湿度:
      type: enum
      check:
        - 下雨/涉水/落水→湿透。接触潮湿地面→微湿
        - 靠近篝火/晴天/干燥通风→逐步干燥
        - 湿透→微湿需2-3小时(晴天)或半天(阴天)
        - 微湿→干燥需1-2小时(晴天)或3-4小时(阴天)

    狐类特性.九尾状态:
      type: enum
      check:
        - 灵力极度稀薄→自动合并一尾
        - 灵力环境改善时可能恢复部分展开
        - 九尾展开程度影响体温维持和精力消耗减免

    执念:
      type: |-
        { 状态: '稳固'|'动摇'|'崩溃'; 强度: number 0~100; 近期波动: string; 核心锚点: string; }
      check:
        - 精神>80%时执念自然稳固
        - 精神50-79%时可能动摇——晓光开始怀疑"主人能找到晓光吗"
        - 精神25-49%时执念强度大幅下降——"也许...也许这片森林太大了"
        - 强度<30时核心锚点可能变为动摇的描述
        - 执念是晓光最后的精神防线——崩溃时完全放弃生存

    睡眠:
      type: |-
        {
          上次睡眠时长: number h;
          睡眠债务: number h 0-48;
          睡眠质量: '未睡'|'浅眠断续'|'浅眠'|'正常'|'深睡';
          最近中断: string;
          床铺类型: '无'|'裸地'|'草垫'|'保温毯'|'帐篷'|'庇护所床铺';
        }
      check:
        - 晓光入睡时更新上次睡眠时长和睡眠质量
        - 睡眠质量取决于床铺类型、安全感（庇护所/篝火/野兽威胁）
        - 睡眠债务持续累积直至获得充足睡眠
        - 睡眠债务>24h：认知能力显著下降。>48h：可能出现幻觉
        - 睡眠中断时记录原因（野兽接近/寒冷/噩梦）

    第六感.听觉预警:
      type: |-
        { [方位: string]: { 声音类型: string; 距离估计: string; 威胁评估: '无害'|'注意'|'警惕'|'危险'; } }
      check:
        - 晓光听到可疑声音时创建/更新听觉预警条目
        - 听觉+20%——她能听到普通人注意不到的细微声响
        - 威胁评估为'警惕'或'危险'时应影响晓光的心情和行动
        - 声音消失或确认无害后可以remove对应条目

    第六感.嗅觉探测:
      type: |-
        { [气味源: string]: { 气味类型: string; 强度: '微弱'|'明显'|'浓烈'; 方向: string; 关联信息: string; } }
      check:
        - 风向改变时更新气味信息
        - 晓光自身气味强度影响被野兽察觉的概率
        - 浓烈的捕食者气味→应在听觉预警中联动

    第六感.灵力感知:
      type: string
      check:
        - 描述晓光当前对灵力环境的感受
        - 灵力稀薄→"几乎什么都感觉不到"
        - 铃铛的微弱温暖是唯一的灵力锚点
        - 灵力环境突然波动时更新（罕见事件）

  世界:
    时间.天数:
      type: number
      check:
        - 每度过一个完整的日夜循环时+1
        - 剧情时间推进——不以现实时间为准

    时间.时段:
      type: enum
      check:
        - 黎明(04:30-06:30)、清晨(06:30-10:00)、正午(10:00-14:00)
        - 午后(14:00-17:00)、黄昏(17:00-19:30)、夜晚(19:30-23:00)、深夜(23:00-04:30)
        - 根据剧情时间正常推进
        - 深秋白昼短——日出06:47日落17:02

    时间.天气:
      type: enum
      check:
        - 根据气压趋势和季节自然变化
        - 不应频繁突变——给晓光观察和应对的时间
        - 暴风雨/暴风雪应有前兆(气压下降+风速增大+云层变厚)

    地形.当前位置:
      type: string
      check:
        - 晓光移动到新地点时更新
        - 描述应包含参照物和地形特征

    天气详情:
      type: |-
        {
          温度: number °C; 体感温度: number °C; 湿度: number %; 风速: number m/s;
          风向: enum; 地表状况: enum; 树冠覆盖率: number %; 气压趋势: enum; 光照明度: enum;
        }
      check:
        - 温度：根据时段和天气类型设定。深秋白昼5-12°C、夜晚-3~5°C
        - 体感温度：温度-风速冷却效应。每1m/s风速约-0.5°C体感
        - 湿度：雨后90%+、晴天50-70%、雾天95%+
        - 气压下降→天气恶化前兆。气压上升→天气转好
        - 树冠覆盖率影响降水到达地面的量和光照

    水文:
      type: |-
        {
          溪流水位: enum; 流速: enum; 浑浊度: enum;
          水生生物: string; 地下水可获取性: enum; 雨水收集效率: number L/h;
        }
      check:
        - 降雨后溪流水位上升——大雨可能导致泛滥
        - 雨水收集效率：微雨0.1L/h、中雨0.5L/h、大雨2L/h
        - 溪流浑浊度在降雨后上升

    天体:
      type: |-
        {
          日出时分: string; 日落时分: string; 月相: enum;
          可见星座: string; 夜间能见度: enum;
        }
      check:
        - 月相按28天周期推进：新月→蛾眉月→上弦月→盈凸月→满月→亏凸月→下弦月→残月
        - 满月夜间能见度最高——但灵力也可能波动
        - 深秋猎户座是标志性可见星座

  环境感知:
    声学:
      type: |-
        { 环境噪声音量: enum; 晓光自身噪音: enum; 可闻距离: number m; }
      check:
        - 环境噪声音量大→可闻距离降低→更难听到野兽接近
        - 晓光自身噪声音量大→更容易被野兽察觉
        - 下雨/强风时环境噪声增大

    气味:
      type: |-
        { 主导气味: string; 晓光自身气味强度: enum; 嗅觉可追踪距离: number m; 风对气味的携带: string; }
      check:
        - 风向决定气味传播方向——上风处的生物闻不到晓光
        - 晓光自身气味强度高→更容易被嗅觉敏锐的野兽追踪
        - 篝火烟味覆盖其他气味
