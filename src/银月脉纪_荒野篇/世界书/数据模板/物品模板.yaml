# 物品模板

当AI需要创建新物品条目时（制作产物、拾取物、搜刮发现等），使用 JSON Patch `insert` 操作，路径为 `/装备/物品栏/物品唯一标识名`。新物品必须包含以下字段：

## 必填字段

```json
{
  "名称": "物品名称",
  "分类": "工具|容器|食物|庇护|武器|医疗|电子|特殊|材料|自制|弹药",
  "重量": 0.0,  // kg，合理估算
  "位置": "手持|背包|腰挂|尾藏|颈间|穿着|营地存储|地面",
  "描述": "简短但具体的描述——包含外观、状态、用途"
}
```

## 分类特定字段

根据物品分类，补充以下字段：

**工具**：耐久度(0-100%)
**武器**：耐久度(0-100%)、锋利度(0-100%)
**食物**：数量(个/块/份)、保质期天(剩余可食用天数)
**容器**：容量(L)、当前容量(L)
**电子**：电量(0-100%)
**消耗品**：使用次数剩余
**衣物**：保暖值(0-10)、防风值(0-10)、防水性(不防水|防泼水|防水|完全防水)、湿度%(0-100)、破损度(0-100)
**材料**：燃烧时长分钟(每单位)、结构强度(1-10)、材料类型(硬木|软木|燧石|...)

## 创建示例

晓光用藤蔓搓了一条临时绳索：

```json
{ "op": "insert", "path": "/装备/物品栏/藤蔓纤维绳", "value": {
  "名称": "藤蔓纤维绳",
  "分类": "材料",
  "重量": 0.3,
  "位置": "背包",
  "描述": "从森林藤蔓中提取纤维手工搓制的绳索。强度不及尼龙绳但足够用于绑扎和简易陷阱",
  "数量": 1,
  "燃烧时长分钟": 15,
  "结构强度": 3,
  "材料类型": "纤维"
}}
```

## 重要提醒

- 物品标识名应简洁且唯一——如"藤蔓纤维绳"而非"用藤蔓做的绳子"
- 重量应合理——参考：小刀0.1-0.3kg、手斧0.5-1kg、帐篷1.5-3kg
- 如果是制作产物，材料从物品栏消耗（remove或delta数量）——不要凭空创造
