# 物品模板

当AI需要创建新物品条目时（制作产物、拾取物、搜刮发现等），使用 JSON Patch `insert` 操作，路径为 `/装备/物品栏/物品唯一标识名`。新物品必须包含以下字段。

## 必填字段

```json
{
  "名称": "物品名称",
  "分类": "工具|容器|食物|庇护|武器|医疗|电子|特殊|材料|自制|弹药|烹饪",
  "重量": 0.0,  // kg，参考真实世界物品
  "位置": "手持|背包|腰挂|尾藏|颈间|穿着|营地存储|地面",
  "描述": "简短但具体的描述——外观、状态、用途"
}
```

## 分类特定字段（按物品实际属性选择，跨分类可选）

- **工具 / 武器 / 庇护**：`耐久度`(0-100%)
- **武器**：额外 `锋利度`(0-100%)
- **食物**：`数量`(个/块/份)、`保质期天`(剩余可食用天数)
- **容器**：`容量`(L)、`当前容量`(L)
- **电子**：`电量`(0-100%)
- **消耗品**（医疗弹药等可消耗物）：`使用次数剩余`
- **衣物**（需在 `/装备/衣物/` 而非物品栏下创建，见下）：`保暖值`(0-10)、`防风值`(0-10)、`防水性`(不防水|防泼水|防水|完全防水)、`湿度`(0-100)、`破损度`(0-100)、`当前层次`(贴身|中间层|外层)
- **材料**：`燃烧时长分钟`(每单位)、`结构强度`(1-10)、`材料类型`
- **通用可选**：`保暖值`、`防风值`、`防水性`、`湿度`、`破损度`、`燃烧时长分钟`、`结构强度`、`材料类型`——物品可能兼具多种属性（如兽皮既是材料又有保暖值）

### 材料类型完整枚举（必须取自此列表，否则校验失败）

`硬木 | 软木 | 燧石 | 花岗岩 | 石灰岩 | 砂岩 | 黏土 | 骨 | 筋 | 皮 | 纤维 | 金属 | 布料 | 塑料`

## 衣物创建（在 /装备/衣物/ 而非物品栏）

衣物有独立的分层保暖机制，应在 `/装备/衣物/衣物名` 下创建：

```json
{ "op": "insert", "path": "/装备/衣物/兽皮披风", "value": {
  "部位": "全身", "保暖值": 6, "防风值": 4,
  "防水性": "防泼水", "湿度": 0, "破损度": 0, "当前层次": "外层"
}}
```

## 创建示例

晓光用藤蔓搓了一条临时绳索：

```json
{ "op": "insert", "path": "/装备/物品栏/藤蔓纤维绳", "value": {
  "名称": "藤蔓纤维绳",
  "分类": "材料",
  "重量": 0.3,
  "位置": "背包",
  "描述": "从森林藤蔓中提取纤维手工搓制的绳索。强度不及尼龙绳但足够用于绑扎和简易陷阱",
  "数量": 1,
  "燃烧时长分钟": 15,
  "结构强度": 3,
  "材料类型": "纤维"
}}
```

## 重量参考（必须基于现实世界）

- 金属水壶1L：0.25-0.35kg | 折叠铲：0.4-0.6kg | 手电筒(LED)：0.08-0.2kg
- 帐篷2P：1.8-2.7kg | 睡袋：0.7-1.4kg | 短柄斧：0.5-0.7kg | 猎刀：0.15-0.3kg
- 防水布2×2m：0.3-0.5kg | 尼龙绳10m：0.08-0.12kg | 急救包(个人)：0.15-0.3kg
- 压缩饼干(每块)：0.08-0.12kg | 手机：0.15-0.25kg | 打火机：0.02-0.05kg
- 1升水=1kg | 盐罐(满)：0.3-0.5kg | 睡垫：0.3-0.5kg

## 重要提醒

- 物品标识名应简洁且唯一——如"藤蔓纤维绳"而非"用藤蔓做的绳子"
- 如果是制作产物，材料从物品栏消耗（remove或delta数量）——不要凭空创造
- **重量自动计入当前负重**（`$当前负重` 由引擎从物品栏实时算，AI 无需手动维护）
- 安全负重上限由体质决定：`安全上限 = 50 × 0.3 × 0.6 × (1+(体质-1)×0.08)`，体质升级后 AI 需手动 replace 此值
- 制作产物如有易损度，标注 `易损度`(0=坚固，越大越脆)；坠机搜刮时会按此减项
