# 地标模板

当晓光发现值得记录的新地点时，AI创建地标条目。路径：`/世界/地标/地标名`

## 字段

```json
{
  "名称": "地标名",
  "方位": "北|南|东|西|东北|西北|东南|西南",
  "距离": "与当前位置的估计距离",
  "类型": "水源|庇护所|资源点|遗迹|危险区|制高点|路径|采集点|狩猎点",
  "描述": "详细描述——外观、特征、潜在价值、已知危险",
  "已探索": true/false
}
```

## 示例

```json
{ "op": "insert", "path": "/世界/地标/天然岩洞", "value": {
  "名称": "天然岩洞",
  "方位": "东",
  "距离": "距飞机残骸约300m",
  "类型": "庇护所",
  "描述": "岩壁下一个天然凹陷——深约4m、宽约3m、入口高度约2m。地面干燥、避风。洞壁有动物蹭过的痕迹(熊?)需要仔细检查后再使用。可作为临时庇护所",
  "已探索": false
}}
```
