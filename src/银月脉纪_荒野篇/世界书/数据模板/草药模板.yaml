# 草药模板

当晓光发现并识别药用植物时（感知≥4触发），AI使用 JSON Patch `insert` 创建药典条目。路径：`/图鉴/草药/植物名`

## 字段

```json
{
  "名称": "植物名称",
  "识别特征": "外观描述——叶片形状/颜色、花朵、茎干、特殊标记",
  "药用功效": "可治疗的疾病或症状",
  "采集部位": "根/茎/叶/花/果实/全草",
  "处理方式": "如何加工——煎煮/捣碎外敷/直接咀嚼/晒干保存",
  "禁忌": "使用注意事项——过量反应、不宜人群、与其他药物的冲突",
  "发现地点": "首次发现地点",
  "季节": "可采集的季节",
  "采集数量": 0
}
```

## 示例

```json
{ "op": "insert", "path": "/图鉴/草药/止血草", "value": {
  "名称": "止血草",
  "识别特征": "叶片对生、椭圆形、边缘有细锯齿。揉碎后有清凉气味。茎干方形、紫红色",
  "药用功效": "止血、消炎——对割伤和擦伤有奇效",
  "采集部位": "叶片",
  "处理方式": "洗净后捣碎成泥状直接敷在伤口上，用布条固定。或晒干碾成粉备用",
  "禁忌": "开放性深伤口不宜——仅用于表皮伤。孕妇慎用",
  "发现地点": "溪流南岸阴湿石缝",
  "季节": "春至秋季",
  "采集数量": 3
}}
```
