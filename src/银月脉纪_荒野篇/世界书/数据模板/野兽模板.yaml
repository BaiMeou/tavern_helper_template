# 野兽模板

当晓光首次遭遇新生物时，AI使用 JSON Patch `insert` 创建图鉴条目。路径：`/图鉴/野兽/生物名`

## 必填字段

```json
{
  "名称": "生物名称",
  "分类": "哺乳类|鸟类|爬行类|鱼类|节肢类|妖兽|不明",
  "危险等级": "无害|警惕|危险|致命",
  "体型": "微型|小型|中型|大型|巨型",
  "活动时段": "昼行/夜行/晨昏/全天",
  "习性": "简要习性描述——食性、群居/独居、领地意识等",
  "足迹描述": "可识别的足迹特征",
  "叫声描述": "叫声的特征和含义",
  "遭遇记录": "晓光的实际遭遇笔记——第一人称描述",
  "首次发现地点": "发现地点",
  "首次发现时间": "第X天 HH:MM",
  "是否可食用": "是/否/部分可食/未知——需说明哪些部位可吃",
  "掉落物": "捕猎后可获得的材料——肉/皮/骨/筋/脂肪等"
}
```

## 掉落物 → 物品栏桥接（重要）

捕猎成功后，AI 应把掉落物实际写入物品栏，而不是只留在图鉴描述里。桥接规则：

- **肉类** → 写入 `/装备/物品栏/物品名`，分类 `食物`，填 `数量`、`保质期天`(鲜肉约2-3天，腌制/熏制后大幅延长)
- **皮类**（鹿皮/兔皮等）→ 写入物品栏，分类 `材料`，填 `保暖值`(皮类通常4-6)、`材料类型:皮`、`结构强度`
- **骨/角** → 写入物品栏，分类 `材料`，填 `结构强度`(骨5-7、角4-5)、`材料类型:骨`
- **筋** → 写入物品栏，分类 `材料`，填 `结构强度`(6-8)、`材料类型:筋`，可作弓弦
- **脂肪** → 写入物品栏，分类 `食物` 或 `材料`，可食用也可引火/防水

数值应与图鉴"掉落物"描述保持一致——例如图鉴写"鹿皮保暖值4"，物品栏里的鹿皮 `保暖值` 也应是 4。

## 示例

晓光在溪流边发现了一只正在饮水的鹿：

```json
{ "op": "insert", "path": "/图鉴/野兽/白尾鹿", "value": {
  "名称": "白尾鹿",
  "分类": "哺乳类",
  "危险等级": "警惕",
  "体型": "中型",
  "活动时段": "晨昏为主",
  "习性": "草食性，群居5-15只。警觉性极高——稍有动静即逃跑。偏好林缘草地和溪流附近",
  "足迹描述": "偶蹄目——两瓣蹄印，约6-8cm长，成年鹿蹄印前端略开叉",
  "叫声描述": "受惊时发出短促鼻息声。繁殖季雄鹿发出低沉吼叫",
  "遭遇记录": "第1天清晨在溪流南岸远远看到一只——它比晓光更早察觉到对方，瞬间消失在林间。如果能猎到一只...够吃好几周",
  "首次发现地点": "溪流南岸草甸",
  "首次发现时间": "第1天 07:15",
  "是否可食用": "是——肉质优良，内脏可食，骨可熬汤。但狩猎难度极高",
  "掉落物": "鹿肉(可分割约30-50kg)、鹿皮(保暖值4、可制衣)、鹿骨(结构强度5、可制工具)、鹿筋(结构强度6、可制弓弦)、鹿角(装饰/工具)"
}}
```
